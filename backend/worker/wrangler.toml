name = "osanwall-api"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "https://osanwall.app"

# KV Namespaces (create with: wrangler kv:namespace create "CACHE")
[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_KV_PREVIEW_ID"

# Rate limiting (Cloudflare paid plan)
# [[unsafe.bindings]]
# name = "RATE_LIMITER"
# type = "ratelimit"
# namespace_id = "1001"
# simple = { limit = 100, period = 60 }

[env.staging]
name = "osanwall-api-staging"
vars = { ENVIRONMENT = "staging" }

[env.production]
name = "osanwall-api"
vars = { ENVIRONMENT = "production" }

# Secrets set via: wrangler secret put SECRET_NAME
# Required secrets:
#   SPOTIFY_CLIENT_ID
#   SPOTIFY_CLIENT_SECRET
#   TMDB_API_KEY
#   GOOGLE_BOOKS_API_KEY
#   FIREBASE_ADMIN_KEY  (base64-encoded service account JSON)
