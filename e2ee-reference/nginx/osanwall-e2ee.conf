# OsanWall E2EE API — TLS termination + strict headers (place behind Cloudflare or direct).
# Replace TLS paths and upstream.

upstream e2ee_api {
    server 127.0.0.1:8443;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name e2ee.example.com;

    ssl_certificate     /etc/ssl/certs/osanwall.fullchain.pem;
    ssl_certificate_key /etc/ssl/private/osanwall.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # mTLS for internal admin — optional separate server block
    # ssl_client_certificate /etc/ssl/ca.crt;
    # ssl_verify_client optional;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;

    # CSP for any browser-facing error pages only — JSON APIs typically omit CSP or use default-src 'none'
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'" always;

    # Do not log request bodies or sensitive headers
    access_log /var/log/nginx/e2ee_access.log combined;
    error_log  /var/log/nginx/e2ee_error.log warn;

    location /v1/ {
        # Use http:// if your app listens plain HTTP behind this nginx
        proxy_pass http://e2ee_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For "";  # strip client IP from upstream — use blinded tokens only
        proxy_set_header X-Real-IP "";
        proxy_set_header Connection "";

        limit_req zone=blinded_limit burst=100 nodelay;
        limit_req_status 429;
    }
}

# In http {} block:
# limit_req_zone $binary_remote_addr zone=ip_fallback:10m rate=10r/s;
# Prefer: map $http_x_blinded_token $blind_key { default $http_x_blinded_token; "" $remote_addr; }
# limit_req_zone $blind_key zone=blinded_limit:10m rate=30r/m;
